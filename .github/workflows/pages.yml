name: Deploy Pages

on:
  push: { branches: ["main"] }
  workflow_dispatch:
  schedule:
    # 04:11 UTC daily (~23:11 ET winter, ~00:11 ET summer)
    - cron: "11 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install import tooling
        run: sudo apt-get update && sudo apt-get install -y jq rsync

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Import remote repository docs
        run: bash scripts/import_sources.sh

      - name: Generate linked project stubs
        run: python3 scripts/generate_linked_redirects.py

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
